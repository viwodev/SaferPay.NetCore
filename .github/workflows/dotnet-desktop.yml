name: Publish to NuGet

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '*'
  release:
    types:
      - published
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  NuGetDirectory: ${{ github.workspace }}/nuget

defaults:
  run:
    shell: pwsh

jobs:
  create_nuget:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build project
        run: dotnet build SaferPay.csproj --configuration Release

      - name: Pack NuGet
        run: dotnet pack SaferPay.csproj --configuration Release --output ${{ env.NuGetDirectory }}

      - uses: actions/upload-artifact@v4
        with:
          name: nuget
          if-no-files-found: error
          retention-days: 7
          path: ${{ env.NuGetDirectory }}/*.nupkg

  validate_nuget:
    runs-on: ubuntu-latest
    needs: [create_nuget]
    steps:
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - uses: actions/download-artifact@v4
        with:
          name: nuget
          path: ${{ env.NuGetDirectory }}

      - name: Install NuGet validator
        run: dotnet tool update Meziantou.Framework.NuGetPackageValidation.Tool --global

      - name: Validate package
        run: meziantou.validate-nuget-package (Get-ChildItem "${{ env.NuGetDirectory }}/*.nupkg")

  run_test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        framework: ['net8.0', 'net10.0']
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore SaferPay.Tests/SaferPay.Tests.csproj

      - name: Run unit tests (${{ matrix.framework }})
        run: >-
          dotnet test SaferPay.Tests/SaferPay.Tests.csproj
          --configuration Release
          --framework ${{ matrix.framework }}
          --filter "FullyQualifiedName!~Integration"
          --logger "trx;LogFileName=unit-${{ matrix.framework }}.trx"
          --collect:"XPlat Code Coverage"
          --results-directory ${{ github.workspace }}/TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.framework }}
          path: ${{ github.workspace }}/TestResults
          if-no-files-found: warn
          retention-days: 7

  run_integration_tests:
    # Sandbox integration tests are opt-in: they only run when the repo has the
    # SAFERPAY_* secrets configured. They will auto-skip otherwise, but we gate
    # the whole job on a manual dispatch / push to main to avoid hitting the
    # sandbox on every PR.
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Run sandbox integration tests
        env:
          SAFERPAY_CUSTOMER_ID: ${{ secrets.SAFERPAY_CUSTOMER_ID }}
          SAFERPAY_TERMINAL_ID: ${{ secrets.SAFERPAY_TERMINAL_ID }}
          SAFERPAY_USERNAME: ${{ secrets.SAFERPAY_USERNAME }}
          SAFERPAY_PASSWORD: ${{ secrets.SAFERPAY_PASSWORD }}
        run: >-
          dotnet test SaferPay.Tests/SaferPay.Tests.csproj
          --configuration Release
          --framework net10.0
          --filter "FullyQualifiedName~Integration"
          --logger "console;verbosity=normal"

  deploy:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    needs: [validate_nuget, run_test]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: nuget
          path: ${{ env.NuGetDirectory }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish to NuGet.org
        run: |
          foreach($file in (Get-ChildItem "${{ env.NuGetDirectory }}" -Recurse -Include *.nupkg)) {
              Write-Host "Publishing $file to NuGet.org..."
              dotnet nuget push $file --api-key "${{ secrets.NUGET_APIKEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
          }
